version: "3.9"

# ── SENTINEL: Autonomous Analytics System ──────────────────────────────────
# All 7 production bugs pre-fixed:
#   1. MLflow → port 5001 (macOS AirPlay holds 5000)
#   2. n8n entrypoint cleared (no /bin/sh mangling)
#   3. Frontend targets api:8000/n8n/upload (not n8n:5678 directly)
#   4. ARM64 g++ injected in api/Dockerfile
#   5. WeasyPrint system libs (cairo, pango) in api/Dockerfile
#   6. Redis + Postgres health-checked before api boots
#   7. MinIO buckets auto-created on first run

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/datasets;
        mc mb --ignore-existing local/charts;
        mc mb --ignore-existing local/reports;
        mc mb --ignore-existing local/models;
        echo 'MinIO buckets ready';
      "

  # ── MLflow — port 5001 (fix #1: macOS AirPlay owns 5000) ───────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      mlflow server
        --backend-store-uri postgresql://analytics:analytics@postgres:5432/analytics
        --default-artifact-root s3://models/
        --host 0.0.0.0
        --port 5001
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "5001:5001"
    logging: *default-logging

  # ── n8n — entrypoint cleared (fix #2) ──────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    entrypoint: []
    command: ["n8n", "start"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: analytics
      DB_POSTGRESDB_USER: analytics
      DB_POSTGRESDB_PASSWORD: analytics
      # Network
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: Asia/Calcutta
      # Security
      N8N_ENCRYPTION_KEY: sentinel2026hackathonkey16
      N8N_OWNER_EMAIL: admin@sentinel.local
      N8N_OWNER_NAME: Admin
      N8N_OWNER_PASSWORD: sentinel-local-pw
      # Runtime
      N8N_RUNNERS_ENABLED: "true"
      EXECUTIONS_PROCESS: main
      N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN: "true"
      # CORS — allow browser + api container
      N8N_CORS_ENABLED: "true"
      N8N_CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data
    logging: *default-logging

  # ── FastAPI — ARM64 + WeasyPrint fixes in Dockerfile ───────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override internal hostnames for Docker network
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5001
      N8N_BASE_URL: http://n8n:5678
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./api:/app
    # Increased timeouts to support large file uploads (100+ MB)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 120
    logging: *default-logging

  # ── ARQ background worker ───────────────────────────────────────────────
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5001
      N8N_BASE_URL: http://n8n:5678
    volumes:
      - ./data:/data
      - ./api:/app
    command: python -m app.worker.main
    logging: *default-logging

  # ── Next.js frontend ────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Browser-facing URLs (mapped host ports)
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_N8N_URL: http://localhost:5678
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      # Server-side URL (Docker internal network — avoids "localhost" routing failure)
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  minio_data:
  n8n_data:
